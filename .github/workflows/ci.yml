name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run tests (parallel)
        run: uv run --python ${{ matrix.python-version }} pytest -v --tb=short -n auto --ignore=tests/comparison

      - name: Run tests with coverage
        if: matrix.python-version == '3.13'
        run: uv run --python ${{ matrix.python-version }} pytest --cov=vedic_calc --cov-report=term-missing --ignore=tests/comparison

      - name: Run comparison tests & generate report
        if: matrix.python-version == '3.13'
        continue-on-error: true
        run: uv run --python ${{ matrix.python-version }} --extra comparison pytest tests/comparison/ -v --tb=short

      - name: Upload comparison report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: comparison-report
          path: reports/
          if-no-files-found: ignore

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev --python 3.13

      - name: Check import sorting
        run: uv run --python 3.13 python -c "import vedic_calc; print('Import OK')"

      - name: Verify package builds
        run: uv build
