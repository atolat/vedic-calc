site_name: vedic-calc
site_description: Open-source Vedic astrology calculation library
repo_url: https://github.com/atolat/vedic-calc
repo_name: atolat/vedic-calc

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: amber
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Accuracy & Testing: accuracy.md
  - Contributing: contributing.md
